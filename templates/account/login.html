<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в Караван Кафе</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{% static 'vendor/bootstrap-5.2.0/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'fontawesomefree/css/all.min.css' %}" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f857a6, #ff5858);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
            animation: slideFade 0.6s ease-out;
        }

        @keyframes slideFade {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .form-control:focus {
            border-color: #ff5e7d;
            box-shadow: 0 0 0 0.25rem rgba(255, 94, 125, 0.25);
        }

        .form-title {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .form-logo {
            width: 100px;
            height: auto;
            display: block;
            margin: 0 auto 1rem;
        }

        .show-password-container {
            position: absolute;
            top: 50%;
            right: 1rem;
            transform: translateY(-50%);
            cursor: pointer;
        }

        .position-relative {
            position: relative;
        }
        .form-logo {
    width: 100px;
    height: 100px;      /* Сделаем квадратным, чтобы круг получился ровным */
    object-fit: cover;  /* Чтобы картинка масштабировалась красиво внутри круга */
    display: block;
    margin: 0 auto 1rem;
    border-radius: 50%; /* Это делает изображение круглым */
    box-shadow: 0 0 8px rgba(0,0,0,0.2); /* Немного тени для красивого эффекта */
}
    </style>
</head>
<body>

<div class="login-container">
    <form method="POST" id="login-form" autocomplete="off">
        {% csrf_token %}
        <div class="form-title text-success">РАЙХАН</div>
        <img src="{% static 'rayhan.png' %}" alt="Logo" class="form-logo">
        <div class="form-title">Войти</div>

        <div class="mb-3">
            <input type="text" class="form-control" name="phone_number" id="phone_number" placeholder="Номер телефона">
        </div>

        <div class="mb-3 position-relative">
            <input type="password" class="form-control" name="password" id="password" placeholder="Пароль">
            <div class="show-password-container">
                <i class="fas fa-eye" id="togglePassword"></i>
            </div>
        </div>

        <div class="alert alert-danger d-none" id="password-error"></div>

        <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
            <label class="form-check-label" for="remember_me">Запомнить меня</label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Войти</button>

        <div class="text-center mt-3">
            <a href="#" class="text-white">Забыл пароль?</a>
        </div>
    </form>
</div>

<script src="{% static 'account/vendor/jquery/jquery-3.2.1.min.js' %}"></script>
<script>
document.getElementById('phone_number').addEventListener('input', function() {
    let phoneNumber = this.value.replace(/\D/g, '');
    if (!phoneNumber.startsWith('996')) {
        phoneNumber = '996' + phoneNumber;
    }
    this.value = phoneNumber.substring(0, 12);
});

document.getElementById('password').addEventListener('input', function() {
    const password = this.value;
    const errorBox = document.getElementById("password-error");
    if (!validatePassword(password)) {
        errorBox.classList.remove("d-none");
        errorBox.textContent = 'Пароль должен содержать минимум 8 символов, включая строчную, заглавную букву и цифру.';
    } else {
        errorBox.classList.add("d-none");
    }
});

function validatePassword(password) {
    return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/.test(password);
}

document.getElementById('togglePassword').addEventListener('click', function() {
    const password = document.getElementById('password');
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
});
</script>
</body>
</html>
