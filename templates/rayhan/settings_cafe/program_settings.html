{% extends "../main/base.html" %}

{% block header %}
<a href="{% url 'main' %}" class="button-menu"><i class="fa-solid fa-angle-left"></i></a>
<div class="mx-auto">
    Настройки кафе
</div>
{% endblock header %}

{% block content %}
<div class="container settings_program">
    <form method="post">
        {% csrf_token %}
        {% for item in settings_program %}
        <div class="d-flex border-bottom p-2 justify-content-between align-items-center">
            <div class="fw-bold fs-5">{{item.name}}</div>
            <div class="form-check form-switch">
                <!-- Add unique name and id to the checkbox -->
                <input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckChecked_{{item.id}}" name="item_{{item.id}}" {% if item.is_active %} checked {% endif %}>
            </div>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary m-2 d-block mx-auto">Сохранить</button>
    </form>
</div>
{% endblock content %}
