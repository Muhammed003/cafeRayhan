<div class="offcanvas offcanvas-top" tabindex="-1" id="offcanvasTop" aria-labelledby="offcanvasTopLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="offcanvasTopLabel">Добавить для официантов</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">
        <form method="post" class="mb-4">
        {% csrf_token %}
        <div class="form-group">
            <label for="choosed_waitress">Выберите официанта</label>
            <select class="form-control" id="choosed_waitress" name="choosed_waitress">
                {% for item in waitress %}
                <option value="{{ item.id }}">{{ item.user.username }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="quantity_waitress">Количества</label>
            <input type="number" class="form-control" id="quantity_waitress" name="quantity" step="0.1" required>
        </div>
        <button type="submit" name="addBreadToWaitress" class="btn btn-success mx-auto mt-2 d-block">Сохранить</button>
    </form>

  </div>
</div>
