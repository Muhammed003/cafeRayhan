<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App and Model List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        h1 {
            color: #007bff;
            text-align: center;
            margin-bottom: 20px;
        }
        .app-card {
            margin-bottom: 20px;
        }
        .model-list {
            list-style-type: none;
            padding-left: 0;
        }
        .model-list li {
            cursor: pointer;
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 5px;
        }
        .model-list li:hover {
            background-color: #f1f1f1;
        }
        .model-details {
            display: none;
        }
        .model-details.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>База данных</h1>
        <div class="row">
            <!-- Left Column: App and Model List -->
            <div class="col-md-4 col-12 mb-3">
                {% for app, models in app_model_data.items %}
                <div class="card app-card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title">{{ app }}</h5>
                    </div>
                    <div class="card-body">
                        <h6>Модули:</h6>
                        <ul class="model-list">
                            {% for model_name, verbose_name in models.items %}
                            <li onclick="showModelDetails('{{ app }}', '{{ model_name }}', '{{ verbose_name }}')">
                                {{ verbose_name }}
                            </li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
                {% endfor %}
            </div>

            <!-- Right Column: Model Details -->
            <div class="col-md-8 col-12">
                <div class="d-flex flex-wrap gap-2 mb-3">
                    <div class="form-group flex-fill">
                        <label for="startDate">Начало</label>
                        <input type="date" id="startDate" class="form-control">
                    </div>
                    <div class="form-group flex-fill">
                        <label for="endDate">Конец</label>
                        <input type="date" id="endDate" class="form-control">
                    </div>
                </div>
                <div class="d-flex justify-content-center gap-3">
                    <button class="btn btn-primary" onclick="filterByDate()">Искать</button>
                    <button
                        class="btn btn-danger"
                        onclick="if (confirm('Вы уверены что хотите удалить этот заказ?')) deleteByDate();">
                        Удалить
                    </button>
                </div>
                <div id="modelDetails" class="model-details mt-4">
                    <h3 id="modelTitle">Выберите</h3>
                    <p id="modelInfo">Please click on a model to view its details.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showModelDetails(app, modelName, verboseName) {
            const modelDetails = document.getElementById('modelDetails');
            const modelTitle = document.getElementById('modelTitle');
            const modelInfo = document.getElementById('modelInfo');

            modelDetails.setAttribute('data-app', app);
            modelDetails.setAttribute('data-model', modelName);

            modelTitle.textContent = `Модул: ${verboseName}`;
            modelInfo.textContent = `Наименование: ${modelName}`;

            fetch(`/get_model_data/${app}/${modelName}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        modelInfo.innerHTML = `<strong>Данные:</strong><br>${data.data}`;
                    } else {
                        modelInfo.textContent = 'Не найден ничего.';
                    }
                })
                .catch(error => {
                    console.error('Error fetching model data:', error);
                    modelInfo.textContent = 'Ошибка загрузки данных.';
                });

            modelDetails.classList.add('active');
        }

        function filterByDate() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const modelDetails = document.getElementById('modelDetails');
            const app = modelDetails.getAttribute('data-app');
            const modelName = modelDetails.getAttribute('data-model');

            if (!startDate || !endDate) {
                alert("Выберите даты.");
                return;
            }
            if (!app || !modelName) {
                alert("Выберите базу данные");
                return;
            }

            fetch(`/filter_model_data/${app}/${modelName}/${startDate}/${endDate}/`)
                .then(response => response.json())
                .then(data => {
                    const modelInfo = document.getElementById('modelInfo');
                    if (data.success) {
                        modelInfo.innerHTML = `<strong>Фильтрация данные:</strong><br>${data.data}`;
                    } else {
                        modelInfo.textContent = 'Нет данных за выбранный диапазон.';
                    }
                })
                .catch(error => {
                    console.error('Error filtering data:', error);
                    alert('Ошибка загрузки данных.');
                });
        }

        function deleteByDate() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const modelDetails = document.getElementById('modelDetails');
            const app = modelDetails.getAttribute('data-app');
            const modelName = modelDetails.getAttribute('data-model');

            if (!startDate || !endDate) {
                alert("Выберите даты.");
                return;
            }
            if (!app || !modelName) {
                alert("Выберите базу данные.");
                return;
            }

            fetch(`/delete_model_data/${app}/${modelName}/${startDate}/${endDate}/`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken(),
                },
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert("Данные успешно удалены.");
                        const modelInfo = document.getElementById('modelInfo');
                        modelInfo.textContent = 'Данные удалены за выбранный диапазон дат.';
                    } else {
                        alert(`Ошибка: ${data.message}`);
                    }
                })
                .catch(error => {
                    console.error('Error deleting data:', error);
                    alert('Ошибка удаления данных.');
                });
        }

        function getCSRFToken() {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.startsWith('csrftoken=')) {
                    return cookie.substring('csrftoken='.length);
                }
            }
            return '';
        }
    </script>
</body>
</html>
