<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пишите наименование группы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }
        .form-label {
            font-weight: 500;
        }
        .btn {
            border-radius: 5px;
        }
        .btn-success {
            background-color: #28a745;
            border: none;
        }
        .btn-success:hover {
            background-color: #218838;
        }
        .btn-secondary {
            background-color: #6c757d;
            border: none;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>Пишите наименование группы</h4>
            </div>
            <div class="card-body">
                <form method="post" action="" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_group_name" class="form-label">Имя группировки</label>
                        {{ form.group_name }}
                        {% if form.group_name.errors %}
                            <div class="text-danger">
                                {{ form.group_name.errors|striptags }}
                            </div>
                        {% endif %}
                    </div>
                    <!-- Hidden field for create_date -->
                    {{ form.create_date }}
                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-success">Сохранить</button>
                        <a href="{% url 'group-stop-list' %}" class="btn btn-secondary ms-2">Отменить</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
