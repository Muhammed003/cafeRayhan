// Function to create a single block item
function createBlockItem(icon, name, link) {
  return `
    <a href="/${link}" class="block__item">
      <div class="block__icon">
        <i class="${icon}"></i>
      </div>
      <div class="block__text">${name}</div>
    </a>
  `;
}

function createBlock(data) {
  const container = document.getElementById('blockContainer');
  let html = '';

  data.forEach(block => {
    html += `
      <div class="block">
        <div class="block__subject_name">${block.subject_name}</div>
        <div class="block__card">
    `;

    block.items.forEach(item => {
      html += createBlockItem(item.icon, item.name, item.link);
    });

    html += `
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

createBlock(data);
