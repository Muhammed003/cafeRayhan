<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rayhan Cafe 3D</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000;}
    canvas { display: block; }

    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      z-index: 100;
    }

    #menu label {
      display: block;
      margin-bottom: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="menu">
  <strong>Показать:</strong>
  <label><input type="checkbox" id="toggleAll" checked> Все объекты</label>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf0f0f0);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 20, 30);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(20, 30, 10);
  light.castShadow = true;
  scene.add(light);
  scene.add(new THREE.AmbientLight(0x404040));

  const controls = new THREE.OrbitControls(camera, renderer.domElement);

  const loadedObjects = [];

  for (let i = 1; i <= 24; i++) {
    const mtlLoader = new THREE.MTLLoader();
    mtlLoader.setPath('/static/models/');
    mtlLoader.load(`rayhancafe-${i}.mtl`, (materials) => {
      materials.preload();

      const objLoader = new THREE.OBJLoader();
      objLoader.setMaterials(materials);
      objLoader.setPath('/static/models/');
      objLoader.load(`rayhancafe-${i}.obj`, (object) => {
        object.scale.set(0.1, 0.1, 0.1);

        // Автоматическая расстановка: 6 столбцов на 4 ряда
        const col = (i - 1) % 6;
        const row = Math.floor((i - 1) / 6);
        object.position.set(col * 5 - 12, 0, row * 5 - 8);

        scene.add(object);
        loadedObjects.push(object);
      });
    });
  }

  // Переключатель видимости
  document.getElementById('toggleAll').addEventListener('change', function () {
    loadedObjects.forEach(obj => {
      obj.visible = this.checked;
    });
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
